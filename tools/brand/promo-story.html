<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800;900&family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+JP:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  @keyframes np-grid{from{background-position:0 0,0 0}to{background-position:0 70px,0 70px}}
  @keyframes np-sun{0%,100%{filter:drop-shadow(0 0 30px rgba(255,80,200,.5))}50%{filter:drop-shadow(0 0 66px rgba(255,140,66,.62))}}
  html,body{width:1080px;height:1920px;overflow:hidden;background:#07040e;font-family:'Rajdhani',sans-serif}
  .stage{position:relative;width:1080px;height:1920px;overflow:hidden;color:#fff;
    background:radial-gradient(110% 60% at 50% 6%,#2a0b52,#140530 40%,#08010f 74%)}
  .sun{position:absolute;left:50%;top:26%;width:620px;height:620px;transform:translate(-50%,-50%);border-radius:50%;
    background:linear-gradient(180deg,#ffd36b,#ff8c42 34%,#ff2bd6 78%,#7b2bff);opacity:.82;animation:np-sun 6s ease-in-out infinite;
    -webkit-mask-image:repeating-linear-gradient(180deg,#000 0 16px,transparent 16px 23px),linear-gradient(180deg,#000 55%,transparent 92%);
    mask-image:repeating-linear-gradient(180deg,#000 0 16px,transparent 16px 23px),linear-gradient(180deg,#000 55%,transparent 92%);
    -webkit-mask-composite:source-in;mask-composite:intersect}
  .horizon{position:absolute;left:0;right:0;top:40%;height:3px;background:linear-gradient(90deg,transparent,#ff2bd6,#00f0ff,#ff2bd6,transparent);box-shadow:0 0 30px 6px rgba(255,43,214,.55)}
  .grid{position:absolute;left:-50%;width:200%;top:40%;bottom:-6%;
    background-image:linear-gradient(rgba(0,240,255,.5) 2px,transparent 2px),linear-gradient(90deg,rgba(0,240,255,.4) 2px,transparent 2px);
    background-size:70px 70px,70px 70px;transform:perspective(520px) rotateX(78deg);transform-origin:top center;animation:np-grid 2s linear infinite;
    -webkit-mask-image:linear-gradient(to bottom,#000,transparent 88%);mask-image:linear-gradient(to bottom,#000,transparent 88%)}
  .scan{position:absolute;inset:0;opacity:.06;background:repeating-linear-gradient(180deg,#fff 0 1px,transparent 1px 3px)}
  .content{position:relative;z-index:2;height:100%;display:flex;flex-direction:column;align-items:center;padding:150px 80px 130px}
  .mark{filter:drop-shadow(0 0 20px rgba(0,240,255,.55))}
  .word{font-family:'Orbitron',sans-serif;font-weight:900;font-size:120px;letter-spacing:1px;line-height:.9;margin-top:30px;
    background:linear-gradient(118deg,#7ffcff,#00f0ff 36%,#ff2bd6);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 0 28px rgba(0,240,255,.3))}
  .kata{font-family:'Noto Sans JP',sans-serif;font-weight:700;font-size:38px;letter-spacing:18px;color:rgba(255,140,66,.92);margin-top:12px;padding-left:18px}
  .tag{font-family:'Orbitron',sans-serif;font-weight:700;font-size:32px;letter-spacing:8px;color:rgba(183,255,0,.9);text-transform:uppercase;margin-top:26px}
  .spacer{flex:1}
  .steps{width:100%;display:flex;flex-direction:column;gap:18px;margin-bottom:60px}
  .step{display:flex;align-items:center;gap:20px;background:linear-gradient(160deg,rgba(40,16,78,.6),rgba(12,4,30,.6));border-radius:22px;padding:26px 30px;backdrop-filter:blur(8px)}
  .step .n{font-family:'Orbitron',sans-serif;font-weight:900;font-size:30px;width:46px;text-align:center}
  .step .t{font-family:'Rajdhani',sans-serif;font-weight:600;font-size:32px;color:#fff}
  .s1{border:1px solid rgba(0,240,255,.22)} .s1 .n{color:#00f0ff}
  .s2{border:1px solid rgba(255,43,214,.22)} .s2 .n{color:#ff2bd6}
  .s3{border:1px solid rgba(255,140,66,.22)} .s3 .n{color:#ff8c42}
  .cta{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:32px;letter-spacing:1px;color:#06121a;background:linear-gradient(95deg,#ff2bd6,#ff8c42);padding:26px 60px;border-radius:16px;box-shadow:0 0 38px rgba(255,43,214,.55)}
</style>
</head>
<body>
<div class="stage">
  <div class="sun"></div>
  <div class="horizon"></div>
  <div class="grid"></div>
  <div class="scan"></div>
  <div class="content">
    <svg class="mark" width="190" height="158" viewBox="0 0 120 100">
      <defs>
        <linearGradient id="b" x1="0" y1="1" x2="1" y2="0"><stop offset="0" stop-color="#00f0ff"/><stop offset=".55" stop-color="#7b8cff"/><stop offset="1" stop-color="#ff2bd6"/></linearGradient>
        <radialGradient id="o" cx=".35" cy=".3" r=".85"><stop offset="0" stop-color="#ffe2b6"/><stop offset=".4" stop-color="#ff9d4d"/><stop offset="1" stop-color="#e8531c"/></radialGradient>
      </defs>
      <rect x="6" y="72" width="34" height="12" rx="6" fill="url(#b)"/>
      <rect x="30" y="52" width="34" height="12" rx="6" fill="url(#b)"/>
      <rect x="54" y="32" width="34" height="12" rx="6" fill="url(#b)"/>
      <circle cx="94" cy="22" r="13" fill="url(#o)"/>
      <circle cx="89.5" cy="18" r="4" fill="rgba(255,255,255,.65)"/>
    </svg>
    <div class="word">neopitch</div>
    <div class="kata">カラオケ</div>
    <div class="tag">sing into the grid</div>
    <div class="spacer"></div>
    <div class="steps">
      <div class="step s1"><div class="n">01</div><div class="t">enable your mic</div></div>
      <div class="step s2"><div class="n">02</div><div class="t">pick your anthem</div></div>
      <div class="step s3"><div class="n">03</div><div class="t">hit the notes, ride the grid</div></div>
    </div>
    <div class="cta">▶ neopitch.naffiq.com</div>
  </div>
</div>
</body>
</html>
